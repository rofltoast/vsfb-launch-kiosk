# Hetzner VSFB kiosk nginx site
# Serves the SPA locally + reverse-proxies external APIs (LL2 + NWS) so the
# kiosk Chrome (on this same box) can hit /api/ll2/ and /api/nws/ without
# CORS and without leaking each viewer's IP to the upstream.

# -- http-level cache zones (must be in conf.d/ or main nginx.conf, not
#    inside a server{} block). Included via /etc/nginx/conf.d/.

proxy_cache_path /var/cache/nginx/ll2
                 levels=1:2
                 keys_zone=ll2_cache:8m
                 max_size=64m
                 inactive=2h
                 use_temp_path=off;

proxy_cache_path /var/cache/nginx/nws
                 levels=1:2
                 keys_zone=nws_cache:8m
                 max_size=64m
                 inactive=2h
                 use_temp_path=off;

resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
resolver_timeout 5s;

server {
    listen 127.0.0.1:8080 default_server;
    server_name _;
    root /var/www/vsfb-kiosk;
    index index.html;

    # SPA fallback for /retro, /admin/retro, etc.
    location / { try_files $uri $uri/ /index.html; }

    add_header Access-Control-Allow-Origin "*" always;
    location = /favicon.ico { log_not_found off; access_log off; }

    # ----------------------------------------------------------------
    # Cached reverse proxy -> ll.thespacedevs.com
    # ----------------------------------------------------------------
    location /api/ll2/ {
        set $ll2_upstream https://ll.thespacedevs.com;
        rewrite ^/api/ll2/(.*)$ /$1 break;
        proxy_pass $ll2_upstream;

        proxy_set_header Host        ll.thespacedevs.com;
        proxy_set_header User-Agent  "vsfb-kiosk/1.0";
        proxy_set_header Accept      "application/json";
        proxy_set_header Authorization "";
        proxy_set_header Cookie      "";

        proxy_ssl_server_name       on;
        proxy_ssl_name              ll.thespacedevs.com;
        proxy_ssl_protocols         TLSv1.2 TLSv1.3;

        proxy_cache               ll2_cache;
        proxy_cache_key           "$request_method|$uri|$args";
        proxy_cache_valid         200 204 10m;
        proxy_cache_valid         301 302 1h;
        proxy_cache_valid         404      1m;
        proxy_cache_valid         429      15m;
        proxy_cache_valid         500 502 503 504  30s;

        proxy_cache_use_stale     error timeout updating http_429 http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock          on;
        proxy_cache_lock_timeout  5s;

        add_header X-Cache-Status $upstream_cache_status always;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Cache-Control "public, max-age=600" always;

        proxy_connect_timeout     5s;
        proxy_read_timeout        10s;
        proxy_send_timeout        10s;
    }

    # ----------------------------------------------------------------
    # Cached reverse proxy -> api.weather.gov (NWS)
    # ----------------------------------------------------------------
    location /api/nws/ {
        set $nws_upstream https://api.weather.gov;
        rewrite ^/api/nws/(.*)$ /$1 break;
        proxy_pass $nws_upstream;

        proxy_set_header Host        api.weather.gov;
        proxy_set_header User-Agent  "vsfb-kiosk-retro/1.0 (contact via github)";
        proxy_set_header Accept      "application/geo+json,application/json,application/ld+json";
        proxy_set_header Authorization "";
        proxy_set_header Cookie      "";

        proxy_ssl_server_name       on;
        proxy_ssl_name              api.weather.gov;
        proxy_ssl_protocols         TLSv1.2 TLSv1.3;

        proxy_cache               nws_cache;
        proxy_cache_key           "$request_method|$uri|$args";
        proxy_cache_valid         200 204 5m;
        proxy_cache_valid         301 302 1h;
        proxy_cache_valid         404      1m;
        proxy_cache_valid         429      15m;
        proxy_cache_valid         500 502 503 504  30s;

        proxy_cache_use_stale     error timeout updating http_429 http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock          on;
        proxy_cache_lock_timeout  5s;

        add_header X-Cache-Status $upstream_cache_status always;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Cache-Control "public, max-age=300" always;

        proxy_connect_timeout     5s;
        proxy_read_timeout        10s;
        proxy_send_timeout        10s;
    }
}
