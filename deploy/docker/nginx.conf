# nginx site config for the VSFB launch kiosk (retro-update + LL2 proxy + NWS proxy).
#
# Routes:
#   /            → kiosk SPA (unchanged)
#   /retro       → retro-cable SPA (same bundle, route-switched in main.jsx)
#   /admin/retro → voice recorder (same bundle)
#   /voice/…     → saved narrator clips (proxied to voice-server)
#   /voice-api/… → voice recorder save/delete/exists (proxied to voice-server)
#   /audio/…     → static jazz bed + other background audio (shipped in bundle)
#   /api/ll2/…   → cached reverse proxy to ll.thespacedevs.com
#   /api/nws/…   → cached reverse proxy to api.weather.gov (retro weather)

# http-context: declare proxy caches.
# LL2 cache (10m TTL, already in use by main kiosk).
proxy_cache_path /var/cache/nginx/ll2
                 levels=1:2
                 keys_zone=ll2_cache:8m
                 max_size=64m
                 inactive=2h
                 use_temp_path=off;

# NWS cache — observations refresh ~5min, forecasts ~1h, AFD ~30min.
# Keep a separate cache so TTLs can be tuned independently of LL2.
proxy_cache_path /var/cache/nginx/nws
                 levels=1:2
                 keys_zone=nws_cache:8m
                 max_size=64m
                 inactive=2h
                 use_temp_path=off;

# DNS resolver for proxy_pass with a variable — nginx needs one to
# re-resolve upstream names at runtime. 1.1.1.1 is Cloudflare's public
# resolver, with Google as a fallback. 5-min cache is fine.
resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
resolver_timeout 5s;

server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ----------------------------------------------------------------
    # Cached reverse proxy -> ll.thespacedevs.com
    # Exposes LL2 at /api/ll2/<path>, e.g.
    #   /api/ll2/2.2.0/launch/upcoming/?location__ids=11&limit=5
    # ----------------------------------------------------------------
    location /api/ll2/ {
        set $ll2_upstream https://ll.thespacedevs.com;

        # Strip the /api/ll2/ prefix before forwarding.
        rewrite ^/api/ll2/(.*)$ /$1 break;

        proxy_pass $ll2_upstream;

        proxy_set_header Host        ll.thespacedevs.com;
        proxy_set_header User-Agent  "vsfb-kiosk/1.0";
        proxy_set_header Accept      "application/json";
        proxy_set_header Authorization "";
        proxy_set_header Cookie      "";

        proxy_ssl_server_name       on;
        proxy_ssl_name              ll.thespacedevs.com;
        proxy_ssl_protocols         TLSv1.2 TLSv1.3;

        # --- Caching policy ---
        proxy_cache               ll2_cache;
        proxy_cache_key           "$request_method|$uri|$args";
        proxy_cache_valid         200 204 10m;
        proxy_cache_valid         301 302 1h;
        proxy_cache_valid         404      1m;
        proxy_cache_valid         429      15m;
        proxy_cache_valid         500 502 503 504  30s;

        proxy_cache_use_stale     error timeout updating http_429 http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock          on;
        proxy_cache_lock_timeout  5s;

        add_header X-Cache-Status $upstream_cache_status always;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Cache-Control "public, max-age=600" always;

        proxy_connect_timeout     5s;
        proxy_read_timeout        10s;
        proxy_send_timeout        10s;
    }

    # ----------------------------------------------------------------
    # Cached reverse proxy -> api.weather.gov (NWS)
    # Exposes the NWS API at /api/nws/<path>, e.g.
    #   /api/nws/stations/KLPC/observations/latest
    #   /api/nws/gridpoints/LOX/117,64/forecast
    #   /api/nws/products/types/AFD/locations/LOX
    # NWS requires a descriptive User-Agent; anonymous hits are throttled.
    # Stale-while-error keeps the retro slideshow from going blank on blips.
    # ----------------------------------------------------------------
    location /api/nws/ {
        set $nws_upstream https://api.weather.gov;

        rewrite ^/api/nws/(.*)$ /$1 break;

        proxy_pass $nws_upstream;

        proxy_set_header Host        api.weather.gov;
        proxy_set_header User-Agent  "vsfb-kiosk-retro/1.0 (contact via github)";
        proxy_set_header Accept      "application/geo+json,application/json,application/ld+json";
        proxy_set_header Authorization "";
        proxy_set_header Cookie      "";

        proxy_ssl_server_name       on;
        proxy_ssl_name              api.weather.gov;
        proxy_ssl_protocols         TLSv1.2 TLSv1.3;

        # --- Caching policy ---
        # Observations update every ~5 min; forecasts every ~1h; AFDs every ~6h.
        # Use a conservative middle-ground TTL — the retro hook also has a
        # 10-min client-side interval, so cache at ~5m and let the client
        # poll request the next refresh.
        proxy_cache               nws_cache;
        proxy_cache_key           "$request_method|$uri|$args";
        proxy_cache_valid         200 204 5m;
        proxy_cache_valid         301 302 1h;
        proxy_cache_valid         404      1m;
        proxy_cache_valid         429      15m;
        proxy_cache_valid         500 502 503 504  30s;

        proxy_cache_use_stale     error timeout updating http_429 http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock          on;
        proxy_cache_lock_timeout  5s;

        add_header X-Cache-Status $upstream_cache_status always;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Cache-Control "public, max-age=300" always;

        proxy_connect_timeout     5s;
        proxy_read_timeout        10s;
        proxy_send_timeout        10s;
    }

    # Hashed assets: cache forever.
    location ~* \.(?:js|css|woff2?|ttf|otf|png|jpg|jpeg|svg|ico|webp)$ {
        access_log off;
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # jazz-loop.mp3 + any other static audio we ship in the bundle.
    location /audio/ {
        access_log off;
        expires    7d;
        add_header Cache-Control "public";
        try_files  $uri =404;
    }

    # Voice clip playback (files stored on a shared volume by voice-server).
    location /voice/ {
        proxy_pass http://voice:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        add_header Cache-Control "no-store";
    }

    # v77 — per-take portrait cards uploaded via /voice-api/:slot/portrait
    # and served at /voice-portrait/:slot so the kiosk can pick the right
    # image for each narration line.
    location /voice-portrait/ {
        proxy_pass http://voice:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        add_header Cache-Control "no-store";
    }

    # Voice admin API (save / delete / exists / reprocess / list).
    location /voice-api/ {
        proxy_pass http://voice:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_request_buffering off;
        proxy_buffering off;
        client_max_body_size 20m;
        add_header Cache-Control "no-store";
    }

    # v71 Skit video playback. Videos can be large and the browser uses
    # Range requests to stream them, so we forward Range headers and
    # disable response buffering.
    location /skit/ {
        proxy_pass http://voice:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_buffering off;
        add_header Cache-Control "no-store";
    }

    # v71 Skit admin API (upload/list/delete). Videos are bigger than
    # audio — bump body limit to 200 MB so a ~30s 1080p clip fits.
    location /skit-api/ {
        proxy_pass http://voice:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_request_buffering off;
        proxy_buffering off;
        client_max_body_size 200m;
        # Long enough for the upload to complete on a slow phone network.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        add_header Cache-Control "no-store";
    }

    # Never cache index.html — lets new deploys reach the browser.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files  $uri =404;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip             on;
    gzip_vary        on;
    gzip_min_length  1024;
    gzip_types       text/plain text/css application/javascript
                     application/json image/svg+xml;

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }
}
